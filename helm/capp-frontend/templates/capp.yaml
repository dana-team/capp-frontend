{{- if eq .Values.deploymentMode "capp" }}
apiVersion: rcs.dana.io/v1alpha1
kind: Capp
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "capp-frontend.labels" . | nindent 4 }}
spec:
  configurationSpec:
    template:
      spec:
        containers:
          - image: {{ include "capp-frontend.image" . }}
            {{- if or .Values.env .Values.backendUrl }}
            env:
              {{- if .Values.backendUrl }}
              - name: BACKEND_URL
                value: {{ .Values.backendUrl | quote }}
              {{- end }}
              {{- if .Values.env }}
              {{- toYaml .Values.env | nindent 14 }}
              {{- end }}
            {{- end }}
{{- end }}
