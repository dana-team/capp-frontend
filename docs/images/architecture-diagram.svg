<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 80" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <!-- Boxes -->
  <rect x="0" y="16" width="120" height="48" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="60" y="44" text-anchor="middle" fill="#e0e0e0" font-weight="600">You (Browser)</text>

  <rect x="190" y="16" width="130" height="48" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="255" y="44" text-anchor="middle" fill="#e0e0e0" font-weight="600">RCS Frontend</text>

  <rect x="390" y="16" width="130" height="48" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="455" y="44" text-anchor="middle" fill="#e0e0e0" font-weight="600">Capp Backend</text>

  <rect x="590" y="16" width="150" height="48" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="665" y="44" text-anchor="middle" fill="#e0e0e0" font-weight="600">Kubernetes Cluster</text>

  <rect x="810" y="16" width="106" height="48" rx="8" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="863" y="44" text-anchor="middle" fill="#e0e0e0" font-weight="600">Capp Operator</text>

  <!-- Arrows -->
  <line x1="120" y1="40" x2="185" y2="40" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="40" x2="385" y2="40" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="40" x2="585" y2="40" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="40" x2="805" y2="40" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
