# deploymentMode controls which resource is rendered:
#   "deployment" — renders a Deployment + Service + optional Ingress
#   "capp"       — renders a Capp CR (rcs.dana.io/v1alpha1)
deploymentMode: deployment

image:
  repository: ghcr.io/dana-team/capp-frontend
  # tag defaults to .Chart.AppVersion when empty
  tag: ""
  pullPolicy: IfNotPresent

# Number of replicas. Only applies when deploymentMode=deployment.
# Capp uses Knative autoscaling; this value is ignored in capp mode.
replicaCount: 1

# Backend URL passed to the container as the BACKEND_URL environment variable.
# Caddy injects this into /config.js at serve time so the React app can reach
# capp-backend without rebuilding the image.
# Example: backendUrl: "https://capp-backend.example.com"
backendUrl: ""

# Additional environment variables passed to the container in both deployment modes.
# Format: [{name: FOO, value: bar}]
env: []

# Service configuration. Only applies when deploymentMode=deployment.
service:
  # Service port. targetPort is always 8080 (the container port).
  port: 8080

# Ingress configuration. Only applies when deploymentMode=deployment.
ingress:
  enabled: false
  host: ""
  tls: false
  # ingressClassName is required on Kubernetes 1.22+
  className: ""

# ServiceAccount configuration. When create=true a ServiceAccount is created and
# referenced by both deployment and capp modes. Set name to override the default
# (which is the release fullname). Annotations are useful for IRSA / Workload Identity.
serviceAccount:
  create: true
  name: "capp-frontend"
  annotations: {}

# Image pull secrets. Only applies when deploymentMode=deployment.
# Needed if the cluster is not already authenticated to GHCR.
# Example: [{name: ghcr-secret}]
imagePullSecrets: []

# Pod-level security context. Only applies when deploymentMode=deployment.
podSecurityContext: {}

# Container-level security context. Applied in both deployment and capp modes.
# Defaults enforce non-root execution and hardening while remaining compatible
# with OpenShift's restricted SCC (no fixed UID/GID — the platform assigns one).
# The image is built with group-0 permissions on /data and /config so Caddy can
# write under any arbitrary UID.
securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# Resource requests and limits. Applied in both deployment and capp modes.
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "128Mi"

# Liveness and readiness probes. Applied in both deployment and capp modes.
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

# Capp-mode specific settings. Only used when deploymentMode=capp.
capp:
  # scaleMetric controls the Knative autoscaling metric.
  # Options: concurrency | rps | cpu | memory
  scaleMetric: "concurrency"

  # state: enabled | disabled
  state: "enabled"

  # route configures the external hostname via the CAPP operator.
  route:
    enabled: false
    hostname: ""
    tlsEnabled: true
    routeTimeoutSeconds: 30

  # log configures Elasticsearch log shipping via SyslogNG.
  log:
    enabled: false
    type: "elastic"
    host: ""
    index: ""
    user: ""
    passwordSecret: ""
